services:
  - type: web
    name: outfit-ai-app
    runtime: docker
    region: singapore  # 离中国最近的免费区
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false  # 部署后手动填入
      - key: PORT
        value: "10000"
    healthCheckPath: /api/health
    autoDeploy: true  # 推送代码自动部署
